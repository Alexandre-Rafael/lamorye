<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamorye — Painel Administrativo do Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07020a;
      --bg-warm: #0f060d;
      --wine: #6b1228;
      --rose: #c94068;
      --gold: #d4a455;
      --gold-lt: #edd48a;
      --cream: #f5e8e0;
      --text: #edddd5;
      --text-dim: #c0909c;
      --border: rgba(212, 164, 85, 0.15);
      --border-focus: rgba(212, 164, 85, 0.4);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-y: scroll;
      line-height: 1.5;
    }

    /* Header styling */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 6vw;
      background: var(--bg-warm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-style: italic;
      color: var(--cream);
      letter-spacing: 0.05em;
    }
    .brand-title span {
      color: var(--gold);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.7rem 1.4rem;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--wine);
      color: var(--text);
      border-color: var(--rose);
      box-shadow: 0 4px 15px rgba(107, 18, 40, 0.3);
    }
    .btn-primary:hover {
      background: var(--rose);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--gold);
      border-color: var(--gold);
    }
    .btn-secondary:hover {
      background: rgba(212, 164, 85, 0.1);
      transform: translateY(-2px);
    }

    /* Container layouts */
    .container {
      max-width: 1200px;
      margin: 2rem auto 6rem;
      padding: 0 1.5rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-style: italic;
      color: var(--gold-lt);
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    /* Tab Switcher */
    .tabs {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 0.75rem 1rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.2s ease;
      position: relative;
    }
    .tab.active {
      color: var(--cream);
    }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--gold);
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* Accordion / Collapsible Lingerie Set list */
    .set-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .set-item {
      background: var(--bg-warm);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .set-head {
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
    }
    .set-head:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .set-head-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .set-head-num {
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .set-head-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--cream);
    }

    .set-head-count {
      font-size: 0.75rem;
      color: var(--text-dim);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
    }

    .set-arrow {
      color: var(--gold);
      transition: transform 0.3s ease;
    }
    .set-item.open .set-arrow {
      transform: rotate(180deg);
    }

    .set-body {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: none;
    }
    .set-item.open .set-body {
      display: block;
    }

    /* Form control styling */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    input[type="text"], textarea {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--border-focus);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Images Grid styling inside set */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
      margin-bottom: 1.5rem;
    }

    .img-card {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      aspect-ratio: 3/4;
      position: relative;
      overflow: hidden;
      cursor: grab;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .img-card:hover {
      border-color: var(--gold-lt);
    }
    .img-card.dragging {
      opacity: 0.4;
      border-style: dashed;
    }

    .img-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--rose);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      transition: background 0.2s ease;
    }
    .remove-btn:hover {
      background: var(--wine);
      color: white;
    }

    .add-img-card {
      border: 2px dashed var(--border);
      border-radius: 4px;
      aspect-ratio: 3/4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--gold);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .add-img-card:hover {
      background: rgba(212, 164, 85, 0.05);
      border-color: var(--gold);
    }
    .add-img-icon {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }
    .add-img-text {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Product Grid Layout */
    .cat-section {
      background: var(--bg-warm);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .cat-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-style: italic;
      color: var(--cream);
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .prod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .prod-edit-card {
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
    }

    .prod-edit-head {
      display: flex;
      gap: 1rem;
    }

    .prod-edit-img {
      width: 80px;
      height: 80px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }
    .prod-edit-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .prod-edit-img-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.2s ease;
      color: #fff;
    }
    .prod-edit-img:hover .prod-edit-img-overlay {
      opacity: 1;
    }

    .prod-edit-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .prod-del-btn {
      align-self: flex-end;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }
    .prod-del-btn:hover {
      color: var(--rose);
    }

    .btn-add-prod {
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--gold);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .btn-add-prod:hover {
      background: rgba(212, 164, 85, 0.05);
      border-color: var(--gold);
    }

    /* Modal / Pop-ups */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--bg-warm);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      transform: scale(0.9);
      transition: transform 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .modal-overlay.open .modal-box {
      transform: scale(1);
    }

    .modal-head {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-style: italic;
      color: var(--cream);
    }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-close:hover {
      color: var(--gold);
    }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    /* Image list picker inside modal */
    .image-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
    }

    .picker-card {
      aspect-ratio: 3/4;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s ease;
    }
    .picker-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .picker-card:hover {
      border-color: var(--gold);
    }
    .picker-card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      font-size: 0.6rem;
      padding: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-dim);
      text-align: center;
    }

    /* Notification overlay */
    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: var(--wine);
      color: white;
      border: 1px solid var(--rose);
      border-radius: 4px;
      padding: 1rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Console Overlay */
    .console-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      display: none;
      flex-direction: column;
      padding: 2rem;
      font-family: 'Courier New', Courier, monospace;
      color: #33ff33;
    }
    .console-overlay.open {
      display: flex;
    }
    .console-box {
      flex: 1;
      border: 1px solid #33ff33;
      padding: 1.5rem;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
      font-size: 0.9rem;
      background: #000;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-title">Lamorye <span>Editor</span></div>
    <div class="action-buttons">
      <button class="btn btn-secondary" onclick="generatePdfs()">Gerar PDFs</button>
      <button class="btn btn-primary" onclick="saveChanges()">Salvar Alterações</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('lingerie')">Lingerie (Conjuntos)</div>
      <div class="tab" onclick="switchTab('erotic')">Produtos Eróticos</div>
    </div>

    <!-- TAB 1: LINGERIE SETS -->
    <div id="content-lingerie" class="tab-content active">
      <h2 class="section-title">Gerenciar Conjuntos</h2>
      <div id="sets-container" class="set-list">
        <!-- Rendered dynamically -->
      </div>
    </div>

    <!-- TAB 2: EROTIC PRODUCTS -->
    <div id="content-erotic" class="tab-content">
      <h2 class="section-title">Gerenciar Produtos por Categoria</h2>
      <div id="categories-container">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="toast">Alterações salvas com sucesso!</div>

  <!-- Console Log Modal for PDF Generation -->
  <div id="console-overlay" class="console-overlay">
    <h3 style="margin-bottom:1rem;font-family:'Inter',sans-serif;color:#fff;">Compilando PDFs no Servidor...</h3>
    <div id="console-box" class="console-box">Iniciando processo...</div>
    <button class="btn btn-secondary" style="align-self:flex-end;" onclick="closeConsole()">Fechar Console</button>
  </div>

  <!-- Modal for Image Selection -->
  <div id="image-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title">Escolher Imagem do Projeto</div>
        <button class="modal-close" onclick="closeImageModal()">&times;</button>
      </div>
      <div class="modal-body">
        <button class="btn btn-primary" style="margin-bottom: 1.5rem; width: 100%; text-align: center;" onclick="triggerFileUpload()">Fazer Upload de Nova Foto</button>
        <div id="image-picker-container" class="image-picker-grid">
          <!-- Rendered dynamically -->
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="file-uploader" style="display:none;" accept="image/*" onchange="handleFileSelected(this.files[0])">

  <script>
    let catalog = { lingerieSets: [], productCategories: [] };
    let allWorkspaceImages = [];
    let activeSelectCallback = null;

    // Load data from APIs
    async function init() {
      try {
        const response = await fetch('/api/catalog');
        catalog = await response.json();
        
        const imgResponse = await fetch('/api/images');
        allWorkspaceImages = await imgResponse.json();
        
        renderLingerieSets();
        renderProductCategories();
      } catch (err) {
        showToast('Erro ao carregar dados do catálogo: ' + err.message);
      }
    }

    // Switch Tabs
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (tabId === 'lingerie') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('content-lingerie').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('content-erotic').classList.add('active');
      }
    }

    // Render Lingerie Sets list (Accordion)
    function renderLingerieSets() {
      const container = document.getElementById('sets-container');
      container.innerHTML = '';
      
      catalog.lingerieSets.forEach((set, index) => {
        const setItem = document.createElement('div');
        setItem.className = 'set-item';
        setItem.id = `set-${set.id}`;
        
        const setHead = document.createElement('div');
        setHead.className = 'set-head';
        setHead.onclick = () => toggleAccordion(setItem);
        
        setHead.innerHTML = `
          <div class="set-head-left">
            <span class="set-head-num">${set.id}</span>
            <span class="set-head-name">${set.name}</span>
            <span class="set-head-count">${set.images.length} fotos</span>
          </div>
          <div class="set-arrow">▼</div>
        `;
        
        const setBody = document.createElement('div');
        setBody.className = 'set-body';
        
        // Form Fields
        const nameGroup = document.createElement('div');
        nameGroup.className = 'form-group';
        nameGroup.innerHTML = `
          <label>Nome do Conjunto</label>
          <input type="text" value="${set.name}" oninput="updateSetName(${index}, this.value)">
        `;
        
        const descGroup = document.createElement('div');
        descGroup.className = 'form-group';
        descGroup.innerHTML = `
          <label>Descrição</label>
          <textarea oninput="updateSetDesc(${index}, this.value)">${set.description}</textarea>
        `;
        
        // Image Gallery with drag-and-drop
        const galleryLabel = document.createElement('label');
        galleryLabel.textContent = 'Imagens (Arraste para reordenar)';
        
        const imageGrid = document.createElement('div');
        imageGrid.className = 'image-grid';
        
        set.images.forEach((img, imgIndex) => {
          const imgCard = document.createElement('div');
          imgCard.className = 'img-card';
          imgCard.setAttribute('draggable', 'true');
          
          // Drag and drop event listeners
          imgCard.addEventListener('dragstart', (e) => {
            imgCard.classList.add('dragging');
            e.dataTransfer.setData('text/plain', JSON.stringify({ setIndex: index, imgIndex }));
          });
          
          imgCard.addEventListener('dragend', () => {
            imgCard.classList.remove('dragging');
          });
          
          imgCard.addEventListener('dragover', (e) => {
            e.preventDefault();
          });
          
          imgCard.addEventListener('drop', (e) => {
            e.preventDefault();
            const data = JSON.parse(e.dataTransfer.getData('text/plain'));
            if (data.setIndex === index) {
              const srcIdx = data.imgIndex;
              const destIdx = imgIndex;
              // Swap images in list
              const temp = catalog.lingerieSets[index].images[srcIdx];
              catalog.lingerieSets[index].images.splice(srcIdx, 1);
              catalog.lingerieSets[index].images.splice(destIdx, 0, temp);
              renderLingerieSets();
              // Keep accordion open
              document.getElementById(`set-${set.id}`).classList.add('open');
            }
          });
          
          imgCard.innerHTML = `
            <img src="${img}">
            <button class="remove-btn" onclick="removeSetImage(${index}, ${imgIndex}, event)">&times;</button>
          `;
          imageGrid.appendChild(imgCard);
        });
        
        // Add image card
        const addCard = document.createElement('div');
        addCard.className = 'add-img-card';
        addCard.onclick = () => openImageModal(imgUrl => {
          catalog.lingerieSets[index].images.push(imgUrl);
          renderLingerieSets();
          document.getElementById(`set-${set.id}`).classList.add('open');
        });
        addCard.innerHTML = `
          <div class="add-img-icon">+</div>
          <div class="add-img-text">Adicionar</div>
        `;
        imageGrid.appendChild(addCard);
        
        setBody.appendChild(nameGroup);
        setBody.appendChild(descGroup);
        setBody.appendChild(galleryLabel);
        setBody.appendChild(imageGrid);
        
        setItem.appendChild(setHead);
        setItem.appendChild(setBody);
        container.appendChild(setItem);
      });
    }

    function toggleAccordion(item) {
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.set-item').forEach(i => i.classList.remove('open'));
      if (!isOpen) {
        item.classList.add('open');
      }
    }

    // Set management updates
    function updateSetName(index, val) {
      catalog.lingerieSets[index].name = val;
      const set = catalog.lingerieSets[index];
      document.querySelector(`#set-${set.id} .set-head-name`).textContent = val;
    }

    function updateSetDesc(index, val) {
      catalog.lingerieSets[index].description = val;
    }

    function removeSetImage(setIdx, imgIdx, e) {
      e.stopPropagation();
      catalog.lingerieSets[setIdx].images.splice(imgIdx, 1);
      const setId = catalog.lingerieSets[setIdx].id;
      renderLingerieSets();
      document.getElementById(`set-${setId}`).classList.add('open');
    }

    // Render Erotic Products Grid
    function renderProductCategories() {
      const container = document.getElementById('categories-container');
      container.innerHTML = '';
      
      catalog.productCategories.forEach((cat, catIndex) => {
        const catSec = document.createElement('div');
        catSec.className = 'cat-section';
        
        const title = document.createElement('h3');
        title.className = 'cat-title';
        title.innerHTML = cat.category.replace(/&amp;/g, '&');
        
        const grid = document.createElement('div');
        grid.className = 'prod-grid';
        
        cat.products.forEach((prod, prodIndex) => {
          const card = document.createElement('div');
          card.className = 'prod-edit-card';
          
          const hasImg = prod.image && prod.image !== 'placeholder';
          
          card.innerHTML = `
            <div class="prod-edit-head">
              <div class="prod-edit-img" onclick="changeProductImage(${catIndex}, ${prodIndex})">
                <img src="${hasImg ? prod.image : 'logo preta.png'}" style="opacity: ${hasImg ? '1' : '0.2'}; object-fit: ${hasImg ? 'cover' : 'contain'}">
                <div class="prod-edit-img-overlay">Mudar</div>
              </div>
              <div class="prod-edit-fields">
                <input type="text" placeholder="Nome do Produto" value="${prod.name}" oninput="updateProdName(${catIndex}, ${prodIndex}, this.value)" style="padding: 0.4rem; font-size: 0.8rem; font-weight: 500;">
                <textarea placeholder="Descrição" oninput="updateProdDesc(${catIndex}, ${prodIndex}, this.value)" style="padding: 0.4rem; font-size: 0.8rem; min-height: 52px; font-weight: 300;">${prod.description}</textarea>
              </div>
            </div>
            <button class="prod-del-btn" onclick="removeProduct(${catIndex}, ${prodIndex})">Remover Produto</button>
          `;
          grid.appendChild(card);
        });
        
        // Add product card button
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-prod';
        addBtn.onclick = () => {
          catalog.productCategories[catIndex].products.push({
            name: 'Novo Produto',
            description: 'Descrição do novo produto.',
            image: ''
          });
          renderProductCategories();
        };
        addBtn.innerHTML = `<span>+ Adicionar Produto</span>`;
        grid.appendChild(addBtn);
        
        catSec.appendChild(title);
        catSec.appendChild(grid);
        container.appendChild(catSec);
      });
    }

    // Product management updates
    function updateProdName(catIdx, prodIdx, val) {
      catalog.productCategories[catIdx].products[prodIdx].name = val;
    }

    function updateProdDesc(catIdx, prodIdx, val) {
      catalog.productCategories[catIdx].products[prodIdx].description = val;
    }

    function changeProductImage(catIdx, prodIdx) {
      openImageModal(imgUrl => {
        catalog.productCategories[catIdx].products[prodIdx].image = imgUrl;
        renderProductCategories();
      });
    }

    function removeProduct(catIdx, prodIdx) {
      if (confirm('Tem certeza que deseja remover este produto?')) {
        catalog.productCategories[catIdx].products.splice(prodIdx, 1);
        renderProductCategories();
      }
    }

    // Modal Image Picker
    function openImageModal(callback) {
      activeSelectCallback = callback;
      const modal = document.getElementById('image-modal');
      const container = document.getElementById('image-picker-container');
      container.innerHTML = '';
      
      // Load workspace images
      allWorkspaceImages.forEach(img => {
        const card = document.createElement('div');
        card.className = 'picker-card';
        card.onclick = () => {
          if (activeSelectCallback) activeSelectCallback(img);
          closeImageModal();
        };
        card.innerHTML = `
          <img src="${img}">
          <div class="picker-card-label">${img.split('/').pop()}</div>
        `;
        container.appendChild(card);
      });
      
      modal.classList.add('open');
    }

    function closeImageModal() {
      document.getElementById('image-modal').classList.remove('open');
      activeSelectCallback = null;
      document.getElementById('file-uploader').value = '';
    }

    function triggerFileUpload() {
      document.getElementById('file-uploader').click();
    }

    function handleFileSelected(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function() {
        const base64 = reader.result.split(',')[1];
        showToast('Enviando imagem...');
        try {
          const response = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, base64 })
          });
          const result = await response.json();
          if (result.success) {
            showToast('Upload concluído com sucesso!');
            // Add image path to allWorkspaceImages if not present
            if (!allWorkspaceImages.includes(result.url)) {
              allWorkspaceImages.push(result.url);
            }
            if (activeSelectCallback) {
              activeSelectCallback(result.url);
            }
            closeImageModal();
          } else {
            showToast('Erro no upload: ' + result.error);
          }
        } catch (err) {
          showToast('Erro de rede no upload: ' + err.message);
        }
      };
      reader.readAsDataURL(file);
    }

    // Save changes to Server
    async function saveChanges() {
      try {
        const response = await fetch('/api/catalog', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(catalog)
        });
        const result = await response.json();
        if (result.success) {
          showToast('Alterações salvas e catálogo compilado!');
        } else {
          showToast('Erro ao salvar: ' + result.error);
        }
      } catch (err) {
        showToast('Erro de rede: ' + err.message);
      }
    }

    // Build PDFs
    async function generatePdfs() {
      const consoleOverlay = document.getElementById('console-overlay');
      const consoleBox = document.getElementById('console-box');
      
      consoleOverlay.classList.add('open');
      consoleBox.textContent = 'Solicitando geração de PDFs ao servidor...\n';
      
      try {
        const response = await fetch('/api/build-pdf', { method: 'POST' });
        const result = await response.json();
        if (result.success) {
          consoleBox.textContent += '\n\n' + result.output;
          consoleBox.textContent += '\n\n[SUCESSO] PDFs gerados com sucesso!';
        } else {
          consoleBox.textContent += '\n\n[ERRO] Falha ao gerar PDFs:\n' + result.error + '\n' + (result.stderr || '');
        }
      } catch (err) {
        consoleBox.textContent += '\n\n[ERRO DE CONEXÃO] ' + err.message;
      }
      // Scroll to bottom
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function closeConsole() {
      document.getElementById('console-overlay').classList.remove('open');
    }

    // Show Notification Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3500);
    }

    // Run on startup
    window.onload = init;
  </script>
</body>
</html>
